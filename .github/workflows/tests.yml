name: Tests

on:
  workflow_dispatch:
    inputs:
      browser:
        description: "Browser to run tests on"
        required: false
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit
        default: "all"
  workflow_call:
    inputs:
      browser:
        description: "Browser to run tests on"
        required: false
        type: string
        default: "all"

env:
  NODE_VERSION: "20"

jobs:
  test:
    name: Run tests (${{ inputs.browser }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          if [ "${{ inputs.browser }}" = "all" ]; then
            npm run run-test
          else
            npm run run-test -- --project=${{ inputs.browser }}
          fi
        env:
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          BASE_URL: https://studio.autonomyai.io
